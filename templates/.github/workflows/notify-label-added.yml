name: Label Webhook

on:
  issues:
    types: [labeled]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Look up webhook URL and fire
        env:
          ALL_VARS: ${{ toJson(vars) }}
          POPEBOT_API_KEY: ${{ secrets.POPEBOT_API_KEY }}
        run: |
          LABEL="${{ github.event.label.name }}"

          # Normalize label to variable name: "plan" → "PLAN_WEBHOOK_URL"
          VAR_NAME=$(echo "$LABEL" | tr '[:lower:]' '[:upper:]' | sed 's/[^A-Z0-9]/_/g')
          WEBHOOK_VAR="${VAR_NAME}_WEBHOOK_URL"

          echo "Label added: '$LABEL' → looking for variable: $WEBHOOK_VAR"

          WEBHOOK_URL=$(echo "$ALL_VARS" | jq -r --arg key "$WEBHOOK_VAR" '.[$key] // empty')

          if [ -z "$WEBHOOK_URL" ]; then
            echo "No variable '$WEBHOOK_VAR' found — skipping"
            exit 0
          fi

          echo "Firing webhook for label '$LABEL' → $WEBHOOK_URL"

          # Payload variables — these names match the JSON keys exactly
          ISSUE_NUMBER=${{ github.event.issue.number }}
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"
          BRANCH="${{ github.event.repository.default_branch }}"
          GITHUB_WF="Label Webhook"

          # Look up optional prompt variable (e.g. PLAN_PROMPT)
          PROMPT_VAR="${VAR_NAME}_PROMPT"
          PROMPT=$(echo "$ALL_VARS" | jq -r --arg key "$PROMPT_VAR" '.[$key] // empty')

          # Substitute payload variables into prompt template (case-insensitive)
          if [ -n "$PROMPT" ]; then
            PROMPT=$(echo "$PROMPT" | perl -pe "\
              s/\{\{issue_number\}\}/${ISSUE_NUMBER}/gi; \
              s/\{\{label\}\}/${LABEL}/gi; \
              s/\{\{owner\}\}/${OWNER}/gi; \
              s/\{\{repo\}\}/${REPO}/gi; \
              s/\{\{branch\}\}/${BRANCH}/gi; \
              s/\{\{github_workflow\}\}/${GITHUB_WF}/gi")
          fi

          # Build base payload
          PAYLOAD=$(jq -n \
            --argjson issue_number "$ISSUE_NUMBER" \
            --arg label "$LABEL" \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg github_workflow "$GITHUB_WF" \
            '{issue_number: $issue_number, label: $label, owner: $owner, repo: $repo, branch: $branch, github_workflow: $github_workflow}')

          # Add prompt only if configured
          if [ -n "$PROMPT" ]; then
            PAYLOAD=$(echo "$PAYLOAD" | jq --arg prompt "$PROMPT" '. + {prompt: $prompt}')
          fi

          curl -s -X POST "$WEBHOOK_URL" \
            -H "x-api-key: $POPEBOT_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
