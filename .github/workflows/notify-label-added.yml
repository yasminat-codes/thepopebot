name: Label Webhook

on:
  issues:
    types: [labeled]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Look up webhook URL and fire
        env:
          ALL_VARS: ${{ toJson(vars) }}
          POPEBOT_API_KEY: ${{ secrets.POPEBOT_API_KEY }}
        run: |
          LABEL="${{ github.event.label.name }}"

          # Normalize label to variable name: "plan" → "PLAN_WEBHOOK_URL"
          VAR_NAME=$(echo "$LABEL" | tr '[:lower:]' '[:upper:]' | sed 's/[^A-Z0-9]/_/g')
          VAR_NAME="${VAR_NAME}_WEBHOOK_URL"

          echo "Label added: '$LABEL' → looking for variable: $VAR_NAME"

          WEBHOOK_URL=$(echo "$ALL_VARS" | jq -r --arg key "$VAR_NAME" '.[$key] // empty')

          if [ -z "$WEBHOOK_URL" ]; then
            echo "No variable '$VAR_NAME' found — skipping"
            exit 0
          fi

          echo "Firing webhook for label '$LABEL' → $WEBHOOK_URL"

          ISSUE_NUMBER=${{ github.event.issue.number }}
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          curl -s -X POST "$WEBHOOK_URL" \
            -H "x-api-key: $POPEBOT_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --argjson issue_number "$ISSUE_NUMBER" \
              --arg label "$LABEL" \
              --arg owner "$OWNER" \
              --arg repo "$REPO" \
              --arg branch "$DEFAULT_BRANCH" \
              --arg github_workflow 'Label Webhook' \
              --arg prompt "Clone https://github.com/${OWNER}/${REPO} on the ${DEFAULT_BRANCH} branch. Develop a technical plan for issue #${ISSUE_NUMBER} and comment the plan back to the issue. If the plan involves UI or frontend changes, add the GitHub label 'ui/ux review' (exact lowercase spelling) to the issue. If it involves security-sensitive changes, add the GitHub label 'security review' (exact lowercase spelling) to the issue." \
              '{issue_number: $issue_number, label: $label, owner: $owner, repo: $repo, branch: $branch, github_workflow: $github_workflow, prompt: $prompt}')"
